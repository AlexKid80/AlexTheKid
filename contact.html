<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="WYLTOR contact page." />
  <meta name="theme-color" content="#0a0d10" />
  <title>WYLTOR Contact</title>

  <style>
    :root{
      --bg:#0a0d10;
      --bg2:#10161b;
      --line:rgba(255,255,255,.10);
      --line-strong:rgba(255,255,255,.18);
      --text:#e9edf0;
      --muted:#97a3ac;
      --white:#ffffff;
      --accent:#8dbd3f;
      --accent-2:#6f9830;
      --accent-glow:rgba(141,189,63,.20);
      --shadow:0 18px 40px rgba(0,0,0,.32);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(141,189,63,.10), transparent 24%),
        radial-gradient(circle at 82% 0%, rgba(111,152,48,.08), transparent 28%),
        linear-gradient(180deg, #090c0f 0%, #0c1115 100%);
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.16;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:46px 46px;
      mask-image:radial-gradient(circle at center, black 35%, transparent 85%);
    }

    a{text-decoration:none;color:inherit}
    button,input,textarea{font:inherit}

    .container{
      width:min(1080px, calc(100% - 32px));
      margin:0 auto;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(10,13,16,.78);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:14px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:600;
      letter-spacing:.35px;
      min-width:0;
    }

    .brand-mark{
      width:40px;
      height:40px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      flex:0 0 auto;
      filter:drop-shadow(0 0 14px rgba(141,189,63,.16));
    }

    .brand-mark svg{
      width:100%;
      height:100%;
      display:block;
    }

    .brand span{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1;
      color:var(--accent);
      text-shadow:0 0 16px rgba(141,189,63,.14);
    }

    .nav-link{
      color:var(--muted);
      font-size:14px;
      transition:.2s ease;
      white-space:nowrap;
    }

    .nav-link:hover{
      color:var(--white);
    }

    .hero{
      padding:72px 0 0;
    }

    .hero-box{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:36px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow:var(--shadow);
      padding:54px 42px 34px;
    }

    .hero-box:before{
      content:"";
      position:absolute;
      right:-70px;
      top:-60px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, var(--accent-glow), transparent 68%);
      pointer-events:none;
    }

    .hero-box:after{
      content:"";
      position:absolute;
      left:-60px;
      bottom:-90px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(111,152,48,.10), transparent 72%);
      pointer-events:none;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      font-size:12px;
      margin-bottom:16px;
      position:relative;
      z-index:1;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 12px rgba(141,189,63,.75);
      animation:pulse 1.7s infinite;
      flex:0 0 auto;
    }

    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:1}
      50%{transform:scale(1.2);opacity:.65}
    }

    h1{
      position:relative;
      z-index:1;
      margin:0;
      max-width:760px;
      font-size:clamp(36px, 5vw, 60px);
      line-height:1.04;
      letter-spacing:-1.45px;
      color:var(--white);
    }

    .accent{
      color:var(--accent);
      text-shadow:0 0 16px rgba(141,189,63,.14);
    }

    .hero-copy{
      position:relative;
      z-index:1;
      margin-top:18px;
      max-width:760px;
      color:var(--muted);
      font-size:16px;
      line-height:1.75;
    }

    .contact-form{
      position:relative;
      z-index:1;
      margin-top:28px;
      display:grid;
      gap:18px;
      max-width:760px;
    }

    .field-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field label{
      color:var(--white);
      font-size:14px;
      font-weight:600;
      letter-spacing:.02em;
    }

    .input,
    .textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.04);
      color:var(--white);
      padding:14px 16px;
      outline:none;
      transition:.22s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .input::placeholder,
    .textarea::placeholder{
      color:#7f8b94;
    }

    .input:focus,
    .textarea:focus{
      border-color:rgba(141,189,63,.45);
      box-shadow:0 0 0 1px rgba(141,189,63,.10), 0 0 18px rgba(141,189,63,.10);
      background:rgba(255,255,255,.055);
    }

    .textarea{
      min-height:160px;
      resize:vertical;
    }

    .rating-wrap{
      display:grid;
      gap:10px;
    }

    .rating-label{
      color:var(--white);
      font-size:14px;
      font-weight:600;
      letter-spacing:.02em;
    }

    .rating{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .rating input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .rating label{
      min-width:48px;
      height:48px;
      padding:0 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.22s ease;
      user-select:none;
      font-size:20px;
      line-height:1;
    }

    .rating label:hover{
      transform:translateY(-1px);
      border-color:rgba(141,189,63,.35);
      color:var(--white);
      background:rgba(141,189,63,.10);
    }

    .rating input:checked + label{
      background:rgba(141,189,63,.16);
      border-color:rgba(141,189,63,.48);
      color:var(--white);
      box-shadow:0 0 0 1px rgba(141,189,63,.08), 0 0 18px rgba(141,189,63,.10);
    }

    .form-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      min-height:52px;
      padding:0 20px;
      border-radius:16px;
      border:1px solid var(--line);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      color:var(--white);
      background:rgba(255,255,255,.05);
      transition:.22s ease;
      text-align:center;
    }

    .btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.08);
      border-color:var(--line-strong);
    }

    .btn.primary{
      background:rgba(141,189,63,.13);
      border-color:rgba(141,189,63,.38);
      box-shadow:0 0 0 1px rgba(141,189,63,.04), 0 0 22px rgba(141,189,63,.08);
    }

    .btn.primary:hover{
      background:rgba(141,189,63,.18);
      border-color:rgba(141,189,63,.55);
      box-shadow:0 0 24px rgba(141,189,63,.14);
    }

    .helper{
      color:var(--muted);
      font-size:13px;
    }

    footer{
      padding:24px 0 34px;
      margin-top:72px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      font-size:12px;
      color:#80909b;
    }

    .footer-copy{
      font-family:Georgia,"Times New Roman",serif;
      font-style:italic;
      font-weight:600;
      font-size:17px;
      line-height:1;
      letter-spacing:.5px;
      color:#8c98a2;
    }

    .reveal{
      opacity:0;
      transform:translateY(18px);
      transition:opacity .75s ease, transform .75s ease;
    }

    .reveal.show{
      opacity:1;
      transform:translateY(0);
    }

    @media (max-width: 860px){
      .hero-box{
        padding:42px 28px 28px;
      }

      h1,
      .hero-copy,
      .contact-form{
        max-width:100%;
      }

      .field-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 760px){
      .hero{
        padding:54px 0 0;
      }

      .hero-box{
        padding:32px 18px 24px;
        border-radius:28px;
      }

      .nav{
        padding:12px 0;
      }

      .nav-link{
        font-size:13px;
      }

      .eyebrow{
        font-size:11px;
        padding:7px 10px;
      }

      h1{
        font-size:clamp(30px, 10vw, 44px);
        line-height:1.07;
        letter-spacing:-1.1px;
      }

      .hero-copy{
        margin-top:14px;
        font-size:15px;
        line-height:1.65;
      }

      .contact-form{
        margin-top:24px;
        gap:16px;
      }

      .input,
      .textarea{
        padding:13px 14px;
      }

      .rating{
        gap:8px;
      }

      .rating label{
        min-width:44px;
        height:44px;
        font-size:18px;
      }

      .form-actions{
        flex-direction:column;
        align-items:stretch;
      }

      .btn{
        width:100%;
        min-height:50px;
        padding:0 14px;
        font-size:14px;
      }

      footer{
        justify-content:center;
        text-align:center;
        padding-top:22px;
        margin-top:54px;
      }

      .footer-copy{
        width:100%;
      }
    }

    @media (max-width: 480px){
      .container{
        width:min(1080px, calc(100% - 20px));
      }

      .brand{
        gap:10px;
      }

      .brand-mark{
        width:34px;
        height:34px;
      }

      .brand span{
        font-size:14px;
      }

      .hero-box{
        padding:28px 16px 20px;
        border-radius:24px;
      }

      h1{
        font-size:30px;
      }

      .hero-copy{
        font-size:14px;
      }

      .rating label{
        min-width:42px;
        height:42px;
        font-size:17px;
      }

      .footer-copy{
        font-size:16px;
      }
    }
  </style>
</head>
<body>

  <div class="nav-wrap">
    <div class="container nav">
      <a class="brand" href="#">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64">
            <defs>
              <linearGradient id="wyltorWGlow" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#9ed14d"></stop>
                <stop offset="100%" stop-color="#6f9830"></stop>
              </linearGradient>
            </defs>
            <rect x="4" y="4" width="56" height="56" rx="18" fill="#1a2024"></rect>
            <rect x="4.5" y="4.5" width="55" height="55" rx="17.5" fill="none" stroke="rgba(255,255,255,0.14)"></rect>
            <circle cx="32" cy="32" r="21" fill="none" stroke="url(#wyltorWGlow)" stroke-width="3.2" opacity="0.95"></circle>
            <circle cx="32" cy="32" r="15.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.4"></circle>
            <path d="M16 21 L23 45 L31 28 L39 45 L48 21" fill="none" stroke="#d7dde1" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M23 45 L31 28 L39 45" fill="none" stroke="url(#wyltorWGlow)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <span>Troubleshoot &amp; Commission</span>
      </a>

      <a class="nav-link" href="https://www.wyltor.com/" target="_blank" rel="noopener">
        Wyltor
      </a>
    </div>
  </div>

  <section class="hero">
    <div class="container">
      <div class="hero-box reveal">
        <div class="eyebrow">
          <span class="dot"></span>
          Contact &amp; Feedback
        </div>

        <h1>
          Contact <span class="accent">Wyltor</span>.
        </h1>

        <div class="hero-copy">
          Send us your feedback, rating or message. All fields are required before sending.
        </div>

        <form class="contact-form" id="contactForm">
          <div class="field-grid">
            <div class="field">
              <label for="name">Name</label>
              <input class="input" id="name" name="name" type="text" placeholder="Your name" required />
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input class="input" id="email" name="email" type="email" placeholder="your@email.com" required />
            </div>
          </div>

          <div class="rating-wrap">
            <div class="rating-label">Rating</div>
            <div class="rating">
              <input type="radio" id="star1" name="rating" value="1" required />
              <label for="star1" aria-label="1 star">★</label>

              <input type="radio" id="star2" name="rating" value="2" required />
              <label for="star2" aria-label="2 stars">★</label>

              <input type="radio" id="star3" name="rating" value="3" required />
              <label for="star3" aria-label="3 stars">★</label>

              <input type="radio" id="star4" name="rating" value="4" required />
              <label for="star4" aria-label="4 stars">★</label>

              <input type="radio" id="star5" name="rating" value="5" required />
              <label for="star5" aria-label="5 stars">★</label>
            </div>
          </div>

          <div class="field">
            <label for="comments">Comments</label>
            <textarea class="textarea" id="comments" name="comments" placeholder="Write your message here..." required></textarea>
          </div>

          <div class="form-actions">
            <button class="btn primary" type="submit">Send Message</button>
            <div class="helper">The message opens in your default email app.</div>
          </div>
        </form>
      </div>

      <footer>
        <span class="footer-copy">© <span id="year"></span></span>
        <span>info@wyltor.ai</span>
      </footer>
    </div>
  </section>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    (function () {
      var items = document.querySelectorAll(".reveal");

      if (!("IntersectionObserver" in window)) {
        for (var i = 0; i < items.length; i++) {
          items[i].classList.add("show");
        }
      } else {
        var obs = new IntersectionObserver(function(entries) {
          for (var i = 0; i < entries.length; i++) {
            if (entries[i].isIntersecting) {
              entries[i].target.classList.add("show");
              obs.unobserve(entries[i].target);
            }
          }
        }, { threshold: 0.12 });

        for (var j = 0; j < items.length; j++) {
          obs.observe(items[j]);
        }
      }

      var form = document.getElementById("contactForm");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        var name = document.getElementById("name").value.trim();
        var email = document.getElementById("email").value.trim();
        var rating = form.querySelector('input[name="rating"]:checked');
        var comments = document.getElementById("comments").value.trim();

        var subject = "WYLTOR Contact Form";
        var body =
          "Name: " + name + "\n" +
          "Email: " + email + "\n" +
          "Rating: " + (rating ? rating.value : "") + "/5\n\n" +
          "Comments:\n" + comments;

        var mailto =
          "mailto:info@wyltor.ai" +
          "?subject=" + encodeURIComponent(subject) +
          "&body=" + encodeURIComponent(body);

        window.location.href = mailto;
      });
    })();
  </script>
</body>
</html>
